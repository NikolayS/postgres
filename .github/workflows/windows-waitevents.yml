name: windows-wait-events

# Runtime verification of the Windows-specific logging wait events from
# v5-0002 (EventlogWrite, and the WriteConsoleW branch of StderrWrite).
# Builds PostgreSQL with MSVC/meson, drives heavy logging into the
# 'stderr,eventlog' destinations, and asserts the new events show up in
# pg_stat_activity. Uses only trusted, built-in context ($env:GITHUB_WORKSPACE);
# no untrusted github.event.* inputs are referenced.

on:
  workflow_dispatch:
  push:
    branches:
      - ci/windows-waitevents

jobs:
  windows-runtime-check:
    runs-on: windows-latest
    timeout-minutes: 150
    env:
      PGUSER: postgres
      PGDATABASE: postgres
      PGHOST: localhost
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install meson and ninja
        shell: pwsh
        run: python -m pip install --upgrade pip meson ninja

      - name: Install flex and bison (winflexbison3)
        shell: pwsh
        run: |
          choco install --no-progress -y winflexbison3
          $cb = "C:\ProgramData\chocolatey\bin"
          Copy-Item "$cb\win_flex.exe"  "$cb\flex.exe"  -Force
          Copy-Item "$cb\win_bison.exe" "$cb\bison.exe" -Force
          flex --version
          bison --version

      - name: Configure (meson)
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          meson setup build --vsenv `
            --prefix "$ws\inst" `
            --buildtype debug `
            -Dssl=none -Dzlib=disabled -Dlz4=disabled -Dzstd=disabled `
            -Dicu=disabled -Dreadline=disabled -Dlibxml=disabled -Dlibxslt=disabled `
            -Dnls=disabled -Dtap_tests=disabled -Dplperl=disabled `
            -Dplpython=disabled -Dpltcl=disabled -Dgssapi=disabled

      - name: Build and install
        shell: pwsh
        run: meson install -C build

      - name: Initialize cluster
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          $env:PATH = "$ws\inst\bin;$env:PATH"
          $data = "$ws\pgdata"
          initdb -D $data -U postgres -A trust --no-sync
          Add-Content "$data\postgresql.conf" "logging_collector = off"
          Add-Content "$data\postgresql.conf" "log_destination = 'stderr,eventlog'"
          Add-Content "$data\postgresql.conf" "log_min_messages = log"
          Add-Content "$data\postgresql.conf" "log_statement = 'none'"
          Add-Content "$data\postgresql.conf" "listen_addresses = 'localhost'"

      - name: Start server
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          $env:PATH = "$ws\inst\bin;$env:PATH"
          pg_ctl -D "$ws\pgdata" -l "$ws\server.log" -w start
          psql -c "select version();"

      - name: Run workload and sample pg_stat_activity
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          $bin = "$ws\inst\bin"
          $env:PATH = "$bin;$env:PATH"
          $psql = "$bin\psql.exe"
          & $psql -v ON_ERROR_STOP=1 -f "ci\win-waitevents\setup.sql"
          $jobs = 1..8 | ForEach-Object {
            Start-Job -ScriptBlock {
              param($psql)
              & $psql -h localhost -U postgres -d postgres -q -c "select logspam(50000)"
            } -ArgumentList $psql
          }
          & $psql -v ON_ERROR_STOP=1 -f "ci\win-waitevents\sample.sql"
          $jobs | Stop-Job
          $jobs | Remove-Job -Force
          Get-Process psql -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Results and assertion
        shell: pwsh
        run: |
          $psql = "$env:GITHUB_WORKSPACE\inst\bin\psql.exe"
          Write-Host "=== wait events captured ==="
          & $psql -c "select wet as wait_event_type, we as wait_event, count(*) as samples from waitsamples group by 1,2 order by 3 desc;"
          $ev = (& $psql -A -t -c "select count(*) from waitsamples where we='EventlogWrite';").Trim()
          $st = (& $psql -A -t -c "select count(*) from waitsamples where we='StderrWrite';").Trim()
          Write-Host "EventlogWrite samples: $ev"
          Write-Host "StderrWrite  samples: $st"
          if ([int]$ev -le 0) {
            Write-Error "FAIL: EventlogWrite was never observed in pg_stat_activity"
            exit 1
          }
          Write-Host "PASS: EventlogWrite observed on Windows ($ev samples)"

      - name: Server log tail
        if: always()
        shell: pwsh
        run: Get-Content "$env:GITHUB_WORKSPACE\server.log" -Tail 60 -ErrorAction SilentlyContinue
